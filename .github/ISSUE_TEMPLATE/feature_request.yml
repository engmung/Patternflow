name: Feature request
description: Suggest a new capability or addition.
labels: ["type:feature"]
body:
  - type: markdown
    attributes:
      value: Lead with the problem you are trying to solve, not just the solution.
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the project would this touch?
      options:
        - firmware
        - web
        - pcb
        - enclosure
        - pattern
        - docs
        - not sure
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What is hard or missing today? Who does it affect?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, if any.
